name: Release package smoke

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: Published release tag to verify
        required: true
        default: v1.0.0

permissions:
  contents: read

jobs:
  install-release:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, macos-15-intel]
    runs-on: ${{ matrix.os }}
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || inputs.tag }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Download and verify published package
        run: python tests/release_artifact_smoke.py
